<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Video</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}

a-scene{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#startButton{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
padding:14px 28px;
background:#ffffffdd;
border-radius:10px;
border:none;
z-index:10;
}

#unmuteButton{
position:absolute;
top:20px;
left:20px;
padding:10px 16px;
font-size:16px;
border:none;
border-radius:8px;
background:#ffffffdd;
z-index:10;
}
</style>
</head>

<body>

<button id="startButton">Chạm để bắt đầu</button>
<button id="unmuteButton">🔊 Bật tiếng</button>

<a-scene
mindar-image="imageTargetSrc: marker.mind;"
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
embedded
>

<a-assets>

<video
id="video1"
src="video1.mp4"
preload="auto"
crossorigin="anonymous"
webkit-playsinline
playsinline
loop
muted
></video>

</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex:0">

<a-video
id="videoPlane"
src="#video1"
width="1.3"
position="0 0 0.01"
></a-video>

</a-entity>

</a-scene>

<script>

const video = document.querySelector("#video1");
const startButton = document.querySelector("#startButton");
const unmuteBtn = document.querySelector("#unmuteButton");
const target = document.querySelector("#target");

/* bấm để bắt đầu AR */

startButton.addEventListener("click",()=>{

video.play().then(()=>{

video.pause();
startButton.style.display="none";

});

});

/* khi quét thấy marker */

target.addEventListener("targetFound",()=>{

video.currentTime = 0;
video.play();

});

/* khi mất marker */

target.addEventListener("targetLost",()=>{

video.pause();

});

/* bật tiếng */

unmuteBtn.addEventListener("click",()=>{

video.muted = false;
video.play();
unmuteBtn.style.display="none";

});
  const videoPlane = document.querySelector("#videoPlane");

/* giữ đúng tỷ lệ video */

video.addEventListener("loadedmetadata", () => {

const ratio = video.videoHeight / video.videoWidth;

videoPlane.setAttribute("height", 1.3 * ratio);

});

</script>

</body>
</html>
